<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      padding: 12px;
      margin: 0;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 15px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .status.on { background: #4ade80; }
    .status.off { background: #f87171; }
    .status.crawling {
      background: #facc15;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
      margin: 10px 0;
    }
    .stat {
      background: #16213e;
      border-radius: 6px;
      padding: 8px;
      text-align: center;
    }
    .stat-value {
      font-size: 18px;
      font-weight: bold;
      color: #60a5fa;
    }
    .stat-label {
      font-size: 10px;
      color: #888;
      margin-top: 2px;
    }
    .groups {
      margin: 8px 0;
    }
    .group-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 8px;
      background: #16213e;
      border-radius: 4px;
      margin-bottom: 3px;
      font-size: 11px;
    }
    .group-name { color: #a5b4fc; }
    .group-time { color: #666; }
    .buttons {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }
    button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }
    .btn-crawl { background: #f59e0b; color: #000; }
    .btn-crawl:disabled { background: #555; color: #888; cursor: not-allowed; }
    .btn-toggle { background: #3b82f6; color: #fff; }
    .btn-toggle.off { background: #22c55e; }
    .btn-flush { background: #8b5cf6; color: #fff; }
    .btn-reset { background: #374151; color: #9ca3af; }
    button:hover:not(:disabled) { opacity: 0.85; }
    .log-box {
      margin-top: 10px;
      background: #0d1117;
      border-radius: 6px;
      padding: 8px;
      max-height: 160px;
      overflow-y: auto;
      font-family: "Cascadia Code", "Fira Code", monospace;
      font-size: 10px;
      line-height: 1.5;
      color: #8b949e;
    }
    .log-box:empty::after {
      content: "No activity yet. Click 'Crawl Now' to start.";
      color: #555;
    }
    .pending-bar {
      margin-top: 6px;
      font-size: 11px;
      color: #888;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2>
    <span id="statusDot" class="status on"></span>
    FB Lead Scraper
  </h2>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="crawls">0</div>
      <div class="stat-label">Crawls</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="extracted">0</div>
      <div class="stat-label">Posts</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="matched">0</div>
      <div class="stat-label">Matched</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="delivered">0</div>
      <div class="stat-label">Delivered</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="intercepted">0</div>
      <div class="stat-label">Intercepted</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="pending">0</div>
      <div class="stat-label">Pending</div>
    </div>
  </div>

  <div class="groups" id="groupsList"></div>

  <div class="buttons">
    <button class="btn-crawl" id="crawlBtn">Crawl Now</button>
    <button class="btn-toggle" id="toggleBtn">Pause</button>
  </div>
  <div class="buttons">
    <button class="btn-flush" id="flushBtn">Flush Queue</button>
    <button class="btn-reset" id="resetBtn">Reset</button>
  </div>

  <div id="nextCrawl" style="text-align:center; margin-top:10px; font-size:11px; color:#888;"></div>

  <div style="text-align:center; margin-top:6px">
    <a href="#" id="openSettings" style="color:#60a5fa; font-size:11px; text-decoration:none;">Settings</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
